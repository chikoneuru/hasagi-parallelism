name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu -e .[dev]

      - name: Lint (ruff)
        run: ruff check hise tests experiments

      - name: Unit tests (pytest)
        run: pytest -ra

      - name: Smoke experiments
        run: |
          python experiments/exp01_smoke_test.py > /dev/null
          python experiments/exp03_elastic_reconfig.py > /dev/null
