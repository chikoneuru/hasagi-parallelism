name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # After the 2026-06-09 restructure the package + tests live in src/tare/ (the git worktree root is
    # src/, so the workspace contains tare/, hasagi/, green/). Run all steps inside tare/.
    defaults:
      run:
        working-directory: tare
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tare/pyproject.toml

      - name: Install dependencies (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu -e .[dev]

      - name: Lint (ruff)
        run: ruff check tare tests experiments

      - name: Unit tests (pytest)
        run: pytest -ra

      - name: Smoke experiments
        run: |
          python experiments/exp01_smoke_test.py > /dev/null
          python experiments/exp03_elastic_reconfig.py > /dev/null
